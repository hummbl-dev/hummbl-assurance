name: release-artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verifier dependency
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Run verifier (pass 1)
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 conformance/verify_conformance.py | tee artifacts/verify_run1.txt

      - name: Run verifier (pass 2)
        run: |
          set -euo pipefail
          python3 conformance/verify_conformance.py | tee artifacts/verify_run2.txt

      - name: Collect vendor surface evidence
        run: |
          set -euo pipefail
          python3 conformance/collect_vendor_surface_evidence.py --out artifacts/vendor_surface_evidence.json

      - name: Verify experimental feature gate
        run: |
          set -euo pipefail
          python3 conformance/verify_vendor_feature_gates.py

      - name: Compare verifier outputs for drift
        run: |
          set -euo pipefail
          diff -u artifacts/verify_run1.txt artifacts/verify_run2.txt > artifacts/verify_diff.txt || true
          if [ -s artifacts/verify_diff.txt ]; then
            echo "Verifier output drift detected; see artifacts/verify_diff.txt" >&2
            exit 1
          fi
          printf '%s\n' "NO_DIFF" > artifacts/verify_diff.txt

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum artifacts/verify_run1.txt > artifacts/SHA256SUMS.txt
          sha256sum artifacts/verify_run2.txt >> artifacts/SHA256SUMS.txt
          sha256sum artifacts/verify_diff.txt >> artifacts/SHA256SUMS.txt
          sha256sum artifacts/vendor_surface_evidence.json >> artifacts/SHA256SUMS.txt

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Automated conformance artifacts for ${tag}."
          fi

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" \
            artifacts/verify_run1.txt \
            artifacts/verify_run2.txt \
            artifacts/verify_diff.txt \
            artifacts/vendor_surface_evidence.json \
            artifacts/SHA256SUMS.txt \
            --clobber

      - name: Resolve conformance run metadata
        id: conformance_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          timeout="${RELEASE_RECEIPT_TIMEOUT_SECONDS:-600}"
          poll="${RELEASE_RECEIPT_POLL_SECONDS:-5}"
          deadline=$((SECONDS + timeout))

          while true; do
            run_json="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow conformance \
              --branch "$tag" \
              --event push \
              --limit 1 \
              --json databaseId,status,conclusion,url)"

            run_id="$(jq -r '.[0].databaseId // empty' <<<"$run_json")"
            if [[ -z "$run_id" ]]; then
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for conformance run for tag ${tag}" >&2
                exit 1
              fi
              sleep "$poll"
              continue
            fi

            status="$(jq -r '.[0].status' <<<"$run_json")"
            conclusion="$(jq -r '.[0].conclusion // ""' <<<"$run_json")"
            run_url="$(jq -r '.[0].url // ""' <<<"$run_json")"

            if [[ "$status" != "completed" ]]; then
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for conformance run completion for tag ${tag}" >&2
                exit 1
              fi
              sleep "$poll"
              continue
            fi

            if [[ "$conclusion" != "success" ]]; then
              echo "Conformance run is not successful for tag ${tag}: ${conclusion}" >&2
              exit 1
            fi

            {
              echo "run_id=${run_id}"
              echo "run_url=${run_url}"
            } >> "$GITHUB_OUTPUT"
            break
          done

      - name: Generate release receipt manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFORMANCE_RUN_ID: ${{ steps.conformance_meta.outputs.run_id }}
          CONFORMANCE_RUN_URL: ${{ steps.conformance_meta.outputs.run_url }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          release_json="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json url,assets)"
          release_url="$(jq -r '.url' <<<"$release_json")"
          assets_json="$(jq -c '[.assets[] | select(.name != "release_receipt.json") | {name, size, digest, url}] | sort_by(.name)' <<<"$release_json")"

          jq -n \
            --arg tag "$tag" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg release_url "$release_url" \
            --argjson conformance_run_id "${CONFORMANCE_RUN_ID}" \
            --arg conformance_run_url "${CONFORMANCE_RUN_URL}" \
            --argjson release_artifacts_run_id "${RELEASE_RUN_ID}" \
            --arg release_artifacts_run_url "${RELEASE_RUN_URL}" \
            --argjson assets "$assets_json" \
            '{
              schema_version: "eal.release.receipt.v1",
              tag: $tag,
              repository: $repository,
              commit_sha: $commit_sha,
              release_url: $release_url,
              conformance_run: {
                run_id: $conformance_run_id,
                url: $conformance_run_url,
                conclusion: "success"
              },
              release_artifacts_run: {
                run_id: $release_artifacts_run_id,
                url: $release_artifacts_run_url,
                conclusion: "success"
              },
              assets: $assets
            }' > artifacts/release_receipt.base.json

          manifest_hash="$(jq -cS . artifacts/release_receipt.base.json | tr -d '\n' | sha256sum | awk '{print $1}')"
          jq --arg manifest_hash "$manifest_hash" \
            '. + {manifest_c14n_sha256: $manifest_hash}' \
            artifacts/release_receipt.base.json > artifacts/release_receipt.json
          rm artifacts/release_receipt.base.json

      - name: Validate release receipt schema
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from jsonschema import validate

          with open("conformance/release_receipt.schema.json", "r", encoding="utf-8") as f:
              schema = json.load(f)
          with open("artifacts/release_receipt.json", "r", encoding="utf-8") as f:
              receipt = json.load(f)

          validate(instance=receipt, schema=schema)
          PY

      - name: Upload release receipt manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" artifacts/release_receipt.json --clobber

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-conformance-artifacts-${{ github.ref_name }}
          path: artifacts/
